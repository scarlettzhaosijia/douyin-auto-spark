name: 🚀 续一次火

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
      timezone: "Asia/Shanghai"

jobs:
  run:
    runs-on: ubuntu-22.04
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-jammy
    timeout-minutes: 15

    steps:
      - name: 克隆当前仓库 (Clone current repo)
        uses: actions/checkout@v6

      - name: 安装 unzip (Install unzip)
        run: apt-get update && apt-get install -y unzip

      - name: 安装 Bun (Set up Bun)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装运行时依赖 (Install dependencies)
        run: bun install --production

      - name: 续一次火 (Run spark job)
        env:
          DOUYIN_COOKIE: ${{ secrets.DOUYIN_COOKIE }}
          DOUYIN_TARGET_NAMES: ${{ secrets.DOUYIN_TARGET_NAMES }}
        run: bun src/main.ts

      - name: 上传失败截图 (Upload failure screenshot)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: douyin-failure-screenshot
          path: failure.png
          if-no-files-found: ignore
          retention-days: 3

